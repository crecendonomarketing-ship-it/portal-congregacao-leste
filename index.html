<style>
:root {
  --olive-900: #333d18;
  --olive-800: #45521f;
  --olive-700: #566627;
  --olive-600: #66782f;
  --olive-500: #85993f;
  --olive-200: #dbe3c6;
  --olive-100: #eef1e4;
  --cream: #fbfaf7;
  --white: #ffffff;
  --ink: #22270f;
  --ink-soft: #63694f;
  --line: #e6e8dc;
  --radius: 12px;
  --radius-lg: 18px;
  --shadow: 0 6px 20px rgba(38, 45, 19, 0.07);
  --shadow-lift: 0 14px 34px rgba(38, 45, 19, 0.14);
  --font-display: "Fraunces", "Georgia", serif;
  --font-body: "Inter", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;
  --sidebar-w: 248px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: var(--font-body);
  background: var(--cream);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; }

/* ===== App shell ===== */
.app { display: flex; min-height: 100vh; }

/* ===== Sidebar ===== */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--olive-900);
  color: var(--olive-100);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 50;
  transition: transform 0.25s ease;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 24px 20px 18px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.brand svg { width: 40px; height: 40px; flex-shrink: 0; }
.brand-text { font-family: var(--font-display); font-weight: 600; font-size: 1.02rem; line-height: 1.2; }
.brand-text .sub { display: block; font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.6; margin-top: 3px; font-weight: 400; }

.nav-list { list-style: none; margin: 0; padding: 10px 12px; flex: 1; overflow-y: auto; }
.nav-item { margin-bottom: 2px; }
.nav-link {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 0.87rem; font-weight: 500;
  color: var(--olive-100);
  opacity: 0.78;
  cursor: pointer;
  border: none; background: none; width: 100%; text-align: left;
  transition: background 0.15s ease, opacity 0.15s ease;
}
.nav-link:hover { background: rgba(255,255,255,0.06); opacity: 1; }
.nav-link.active { background: var(--olive-600); opacity: 1; color: #fff; }
.nav-link .ic { width: 18px; height: 18px; flex-shrink: 0; }

.sidebar-foot {
  padding: 14px 20px 20px;
  font-size: 0.68rem;
  color: rgba(255,255,255,0.4);
  border-top: 1px solid rgba(255,255,255,0.08);
}

.menu-toggle {
  display: none;
  position: fixed;
  top: 14px; left: 14px; z-index: 60;
  background: var(--olive-900);
  color: #fff;
  border: none;
  width: 42px; height: 42px;
  border-radius: 10px;
  align-items: center; justify-content: center;
  box-shadow: var(--shadow);
}

.sidebar-scrim {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 45;
}

/* ===== Main content ===== */
.content {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-width: 0;
  padding: 36px 40px 80px;
  max-width: 980px;
}

.panel { display: none; animation: fade 0.25s ease; }
.panel.active { display: block; }
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.panel-title { font-family: var(--font-display); font-size: 1.9rem; font-weight: 600; color: var(--olive-900); margin: 0 0 4px; }
.panel-desc { color: var(--ink-soft); margin: 0 0 26px; font-size: 0.94rem; }

/* ===== Selector (month / year) ===== */
.selector-bar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 22px; flex-wrap: wrap;
}
.selector-bar select {
  font-family: var(--font-body); font-weight: 600; font-size: 0.85rem;
  color: var(--olive-900);
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 9px 14px;
  cursor: pointer;
}
.year-nav { display: flex; align-items: center; gap: 8px; }
.year-nav button {
  border: 1px solid var(--line); background: var(--white); border-radius: 8px;
  width: 32px; height: 32px; cursor: pointer; color: var(--olive-800); font-weight: 700;
}
.year-nav .year-label { font-family: var(--font-mono); font-weight: 600; min-width: 50px; text-align: center; }

/* ===== Cards ===== */
.card { background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow); margin-bottom: 16px; overflow: hidden; border: 1px solid var(--line); }
.card-head {
  background: var(--olive-700); color: #fff; padding: 13px 20px;
  font-family: var(--font-mono); font-size: 0.75rem; letter-spacing: 0.04em; text-transform: uppercase;
  display: flex; align-items: baseline; justify-content: space-between; gap: 10px;
}
.card-head .date-day { opacity: 0.7; font-weight: 400; text-transform: none; }
.card-body { padding: 18px 20px; }

.field-row { display: flex; justify-content: space-between; gap: 16px; padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 0.92rem; }
.field-row:last-child { border-bottom: none; }
.field-label { color: var(--ink-soft); font-weight: 500; min-width: 42%; }
.field-value { text-align: right; font-weight: 600; color: var(--olive-900); }
.field-value:empty::after { content: "—"; color: var(--line); font-weight: 400; }

.section-tag {
  font-family: var(--font-mono); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--olive-600); font-weight: 700; margin: 18px 0 6px;
}
.section-tag:first-child { margin-top: 0; }

/* ===== Home cards grid ===== */
.hero-panel {
  background: linear-gradient(155deg, var(--olive-800), var(--olive-600));
  color: #fff; border-radius: var(--radius-lg); padding: 38px 32px; margin-bottom: 28px;
}
.hero-panel h2 { font-family: var(--font-display); font-size: 1.9rem; margin: 0 0 8px; }
.hero-panel p { color: var(--olive-100); max-width: 520px; margin: 0; }

.home-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 16px; }
.home-card {
  background: var(--white); border: 1px solid var(--line); border-radius: var(--radius-lg);
  padding: 20px; cursor: pointer; text-align: left;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.home-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lift); }
.home-card .ic { width: 26px; height: 26px; color: var(--olive-600); margin-bottom: 12px; }
.home-card h3 { font-family: var(--font-display); font-size: 1.05rem; margin: 0 0 6px; color: var(--olive-900); }
.home-card p { font-size: 0.83rem; color: var(--ink-soft); margin: 0; line-height: 1.4; }

/* ===== Grupos ===== */
.grupo-head { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.badge { background: rgba(255,255,255,0.15); border-radius: 20px; padding: 4px 12px; font-size: 0.72rem; }
.member-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 20px; margin-top: 8px; }
.member-grid span { font-size: 0.88rem; padding: 5px 0; border-bottom: 1px dashed var(--line); }

/* ===== Território ===== */
.territ-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
.territ-tab-btn {
  border: 1px solid var(--line); background: var(--white); color: var(--olive-800);
  padding: 9px 16px; border-radius: 10px; font-weight: 600; font-size: 0.85rem; cursor: pointer;
}
.territ-tab-btn.active { background: var(--olive-700); color: #fff; border-color: var(--olive-700); }
.territorio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; }
.territorio-chip { background: var(--white); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 18px; text-align: center; box-shadow: var(--shadow); }
.territorio-chip .num { font-family: var(--font-display); font-size: 1.7rem; color: var(--olive-700); font-weight: 700; }
.territorio-chip .place { font-size: 0.8rem; color: var(--ink-soft); margin: 4px 0 12px; }
.map-btn {
  display: inline-block; background: var(--olive-700); color: #fff; font-size: 0.78rem; font-weight: 600;
  padding: 7px 12px; border-radius: 8px;
}
.map-full { width: 100%; border-radius: var(--radius-lg); border: 1px solid var(--line); box-shadow: var(--shadow); }

/* ===== Donativos ===== */
.donativos-cta { background: var(--olive-700); color: #fff; border: none; padding: 12px 22px; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 14px; }
.pix-box { background: var(--olive-100); border-radius: var(--radius); padding: 16px 20px; font-family: var(--font-mono); font-size: 0.92rem; color: var(--olive-900); }

.modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(20,24,10,0.5); z-index: 80; align-items: center; justify-content: center; padding: 20px; }
.modal-backdrop.open { display: flex; }
.modal-box { background: #fff; border-radius: var(--radius-lg); max-width: 440px; width: 100%; padding: 28px; box-shadow: var(--shadow-lift); position: relative; }
.modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--ink-soft); }
.modal-box h3 { font-family: var(--font-display); color: var(--olive-900); margin-top: 0; }
.donate-link-btn { display: inline-block; margin-top: 16px; background: var(--olive-800); color: #fff; padding: 11px 18px; border-radius: 10px; font-weight: 600; font-size: 0.88rem; }

/* Empty / loading */
.empty-state { border: 1.5px dashed var(--olive-200); border-radius: var(--radius-lg); padding: 30px 20px; text-align: center; color: var(--ink-soft); font-size: 0.9rem; }

@media (max-width: 900px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .content { margin-left: 0; padding: 76px 18px 60px; }
  .menu-toggle { display: flex; }
  .sidebar-scrim.open { display: block; }
  .panel-title { font-size: 1.5rem; }
}


.brand-logo { justify-content: center; padding: 22px 20px; }
.brand-logo-img { width: 100%; max-width: 180px; border-radius: 10px; display: block; }

.band { color: #fff; padding: 10px 20px; font-weight: 700; font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.03em; margin: 14px -20px 0; display: flex; align-items: center; gap: 8px; }
.band:first-of-type { margin-top: 0; }
.band-tesouros { background: #3d6b3d; }
.band-ministerio { background: #9c7a1f; }
.band-vidacrista { background: #8a1f4d; }
.band + .field-row { padding-top: 12px; }

.donate-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 700px) { .donate-grid { grid-template-columns: 1fr; } }
.donate-cta-outline { display: inline-block; margin-top: 14px; color: var(--olive-700); font-weight: 600; font-size: 0.85rem; text-decoration: underline; }
.month-toggle { width: 100%; text-align: left; background: var(--white); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 14px 18px; font-family: var(--font-body); font-weight: 700; font-size: 0.95rem; color: var(--olive-900); cursor: pointer; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.month-toggle .arrow { transition: transform 0.15s ease; opacity: 0.6; }
.month-toggle.open .arrow { transform: rotate(90deg); }
.month-badge { background: var(--olive-700); color: #fff; border-radius: 20px; padding: 2px 10px; font-size: 0.72rem; font-family: var(--font-mono); }
.month-body { display: none; margin: -4px 0 14px; }
.month-body.open { display: block; }
.month-empty { color: var(--ink-soft); font-size: 0.85rem; font-style: italic; padding: 4px 4px 14px; }
</style>
</head>

/* ---------- Shell build ---------- */
const sidebarNav = document.getElementById("sidebarNav");
const main = document.getElementById("main");

function icon(name) {
  return `<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${ICONS[name] || ""}</svg>`;
}

function buildSidebar() {
  SECTIONS.forEach((s) => {
    const li = document.createElement("li");
    li.className = "nav-item";
    li.innerHTML = `<button class="nav-link" data-target="${s.id}">${icon(s.icon)}<span>${s.label}</span></button>`;
    li.querySelector("button").addEventListener("click", () => { showPanel(s.id); closeMobileSidebar(); });
    sidebarNav.appendChild(li);
  });
}

function buildPanels() {
  SECTIONS.forEach((s) => {
    const panel = document.createElement("section");
    panel.className = "panel";
    panel.id = "panel-" + s.id;
    main.appendChild(panel);
  });
}

function showPanel(id) {
  document.querySelectorAll(".panel").forEach((p) => p.classList.remove("active"));
  document.querySelectorAll(".nav-link").forEach((b) => b.classList.remove("active"));
  document.getElementById("panel-" + id).classList.add("active");
  document.querySelector(`.nav-link[data-target="${id}"]`).classList.add("active");
  window.scrollTo({ top: 0, behavior: "smooth" });
  history.replaceState(null, "", "#" + id);
  renderPanel(SECTIONS.find((s) => s.id === id));
}

function closeMobileSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("scrim").classList.remove("open");
}

/* ---------- Helpers ---------- */
function fieldRow(label, value) {
  if (!value) return "";
  return `<div class="field-row"><span class="field-label">${label}</span><span class="field-value">${escapeHtml(value)}</span></div>`;
}
function escapeHtml(str) {
  return String(str).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}
function formatDateHeader(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T00:00:00");
  if (isNaN(d)) return dateStr;
  const dias = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
  return `${d.toLocaleDateString("pt-BR")} <span class="date-day">${dias[d.getDay()]}</span>`;
}
function monthOf(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + "T00:00:00");
  return isNaN(d) ? null : d.getMonth();
}
function yearOf(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + "T00:00:00");
  return isNaN(d) ? null : d.getFullYear();
}
function emptyState(msg) {
  return `<div class="empty-state">${msg || "Nenhuma informação cadastrada ainda nesta seção.<br>Atualize direto no Notion e ela aparece aqui automaticamente."}</div>`;
}

/* ---------- Generic weekly/date renderer ---------- */
function renderDateList(section) {
  const rows = DATA[section.id] || [];
  let filtered = rows;
  if (section.monthFilter) {
    filtered = rows.filter((r) => monthOf(r[section.dateKey]) === currentMonth);
  } else if (section.yearFilter) {
    filtered = rows.filter((r) => yearOf(r[section.dateKey]) === currentYear);
  }
  filtered = [...filtered].sort((a, b) => (a[section.dateKey] || "").localeCompare(b[section.dateKey] || ""));

  const selectorHtml = section.monthFilter ? monthSelectorHtml(section.id) : section.yearFilter ? yearSelectorHtml(section.id) : "";

  if (filtered.length === 0) {
    return selectorHtml + emptyState();
  }

  const cards = filtered.map((row) => {
    const header = formatDateHeader(row[section.dateKey]);
    const sub = row[section.titleKey] || "";
    const body = (section.fields || Object.keys(row).filter((k) => k !== section.titleKey && k !== section.dateKey))
      .map((k) => fieldRow(k, row[k])).join("");
    return `<div class="card">
      <div class="card-head"><span>${header}</span><span>${escapeHtml(sub)}</span></div>
      <div class="card-body">${body || '<span style="color:var(--ink-soft);font-size:0.88rem">Sem detalhes cadastrados</span>'}</div>
    </div>`;
  }).join("");

  return selectorHtml + cards;
}

function monthSelectorHtml(sectionId) {
  const opts = MESES.map((m, i) => `<option value="${i}" ${i === currentMonth ? "selected" : ""}>${m}</option>`).join("");
  return `<div class="selector-bar">
    <select onchange="setMonth('${sectionId}', this.value)">${opts}</select>
  </div>`;
}
function yearSelectorHtml(sectionId) {
  return `<div class="selector-bar">
    <div class="year-nav">
      <button onclick="setYear('${sectionId}', ${currentYear - 1})">‹</button>
      <span class="year-label">${currentYear}</span>
      <button onclick="setYear('${sectionId}', ${currentYear + 1})">›</button>
    </div>
  </div>`;
}
function setMonth(sectionId, v) { currentMonth = parseInt(v, 10); renderPanel(SECTIONS.find((s) => s.id === sectionId)); }
function setYear(sectionId, v) { currentYear = v; renderPanel(SECTIONS.find((s) => s.id === sectionId)); }

/* ---------- Início ---------- */
function renderInicio() {
  const cards = SECTIONS.filter((s) => s.id !== "inicio").map((s) => `
    <button class="home-card" onclick="showPanel('${s.id}')">
      ${icon(s.icon)}
      <h3>${s.label}</h3>
      <p>${s.desc || ""}</p>
    </button>`).join("");
  return `
    <div class="hero-panel">
      <h2>Bem-vindos ao Portal da Congregação Leste</h2>
      <p>Aqui você encontrará todas as escalas, designações e ferramentas de organização sempre atualizadas.</p>
    </div>
    <div class="home-grid">${cards}</div>`;
}

/* ---------- Reunião Pública (custom) ---------- */
function renderReuniaoPublica() {
  const rows = (DATA.programacaoSemanal || [])
    .filter((r) => monthOf(r["Data Reunião Pública"]) === currentMonth && (r["Orador"] || r["Tema Discurso"]));
  rows.sort((a, b) => (a["Data Reunião Pública"] || "").localeCompare(b["Data Reunião Pública"] || ""));
  if (rows.length === 0) return monthSelectorHtml("reuniaoPublica") + emptyState();
  const cards = rows.map((r) => `
    <div class="card">
      <div class="card-head"><span>${formatDateHeader(r["Data Reunião Pública"])}</span><span>${escapeHtml(r["Presidente Reunião Pública"] || "")}</span></div>
      <div class="card-body">
        ${fieldRow("Presidente", r["Presidente Reunião Pública"])}
        ${fieldRow("Tema", r["Tema Discurso"])}
        ${fieldRow("Orador", r["Orador"])}
        ${fieldRow("Congregação Visitante", r["Congregação Visitante"])}
        ${fieldRow("Leitor da Sentinela", r["Leitor da Sentinela"])}
      </div>
    </div>`).join("");
  return monthSelectorHtml("reuniaoPublica") + cards;
}

/* ---------- Vida e Ministério (custom) ---------- */
function renderVidaMinisterio() {
  const rows = (DATA.programacaoSemanal || []).filter((r) => monthOf(r["Data"]) === currentMonth);
  rows.sort((a, b) => (a["Data"] || "").localeCompare(b["Data"] || ""));
  if (rows.length === 0) return monthSelectorHtml("vidaMinisterio") + emptyState();

  const partes = DATA.partesReuniao || [];
  const secoes = [
    { nome: "Tesouros da Palavra", classe: "band-tesouros", icone: "💎" },
    { nome: "Faça Seu Melhor no Ministério", classe: "band-ministerio", icone: "🌾" },
    { nome: "Nossa Vida Cristã", classe: "band-vidacrista", icone: "🐑" },
  ];

  const cards = rows.map((r) => {
    const semanaPartes = partes.filter((p) => p["Data da Semana"] === r["Data"]);
    const secoesHtml = secoes.map((sec) => {
      const items = semanaPartes.filter((p) => p["Seção"] === sec.nome).sort((a, b) => (a["Ordem"] || 0) - (b["Ordem"] || 0));
      if (items.length === 0) return "";
      const rowsHtml = items.map((p) => {
        const tempo = p["Tempo (min)"] ? ` (${p["Tempo (min)"]} min)` : "";
        const resp = [p["Responsável 1"], p["Responsável 2"]].filter(Boolean).join(" / ");
        return fieldRow(p["Título da Parte"] + tempo, resp);
      }).join("");
      return `<div class="band ${sec.classe}"><span>${sec.icone}</span>${sec.nome}</div>${rowsHtml}`;
    }).join("");

    return `
    <div class="card">
      <div class="card-head"><span>${formatDateHeader(r["Data"])}</span><span>${escapeHtml(r["Leitura Bíblica"] || "")}</span></div>
      <div class="card-body">
        ${fieldRow("Presidente", r["Presidente VM"])}
        ${fieldRow("Cântico Abertura", r["Cântico Abertura"])}
        ${fieldRow("Oração Inicial", r["Oração Inicial"])}
        ${secoesHtml}
        ${fieldRow("Cântico Encerramento", r["Cântico Encerramento"])}
        ${fieldRow("Oração Final", r["Oração Final"])}
      </div>
    </div>`;
  }).join("");
  return monthSelectorHtml("vidaMinisterio") + cards;
}

/* ---------- Grupos (custom) ---------- */
function renderGrupos() {
  const rows = DATA.grupos || [];
  if (rows.length === 0) return emptyState();
  return rows.map((r) => {
    const membros = (r["Integrantes"] || "").split(",").map((m) => m.trim()).filter(Boolean);
    return `<div class="card">
      <div class="card-head grupo-head">
        <span>${escapeHtml(r["Grupo"] || "")}</span>
        <span class="badge">${membros.length} publicadores</span>
      </div>
      <div class="card-body">
        ${fieldRow("Superintendente", r["Superintendente"])}
        ${fieldRow("Auxiliar", r["Auxiliar"])}
        ${membros.length ? `<div class="section-tag">Integrantes</div><div class="member-grid">${membros.map((m) => `<span>${escapeHtml(m)}</span>`).join("")}</div>` : ""}
      </div>
    </div>`;
  }).join("");
}

/* ---------- Responsáveis (custom, via Notion) ---------- */
function renderResponsaveis() {
  const rows = DATA.responsaveis || [];
  if (rows.length === 0) return emptyState("Nenhum responsável cadastrado ainda. Adicione pessoas na base Responsáveis do Notion, com nome e função.");
  const groups = {};
  rows.forEach((r) => {
    const funcoes = (r["Funções"] || "Outros").split(",").map((f) => f.trim()).filter(Boolean);
    (funcoes.length ? funcoes : ["Outros"]).forEach((f) => {
      groups[f] = groups[f] || [];
      groups[f].push(r);
    });
  });
  return Object.entries(groups).map(([func, people]) => `
    <div class="card">
      <div class="card-head">${escapeHtml(func)}</div>
      <div class="card-body">
        ${people.map((p) => fieldRow(p["Nome"], [p["Telefone"], p["Email"], p["Observação"]].filter(Boolean).join(" · "))).join("")}
      </div>
    </div>`).join("");
}

/* ---------- Território (custom) ---------- */
function renderTerritorio() {
  const rows = DATA.territorio || [];
  const tabsHtml = `<div class="territ-tabs">
    <button class="territ-tab-btn ${territTab === 'lista' ? 'active' : ''}" onclick="setTerritTab('lista')">Lista de Territórios</button>
    <button class="territ-tab-btn ${territTab === 'mapa' ? 'active' : ''}" onclick="setTerritTab('mapa')">Mapa Completo</button>
  </div>`;

  if (territTab === "mapa") {
    return tabsHtml + `<div class="card"><div class="card-body" style="text-align:center;color:var(--ink-soft)">
      O mapa completo da congregação pode ser adicionado aqui como imagem — envie o arquivo pra eu inserir.
    </div></div>`;
  }

  if (rows.length === 0) return tabsHtml + emptyState();
  const chips = rows.map((r) => `
    <div class="territorio-chip">
      <div class="num">${escapeHtml(r["Território"] || "")}</div>
      <div class="place">${escapeHtml(r["Quadras"] || r["Tipo"] || "")}</div>
      ${r["Link Google Maps"] ? `<a class="map-btn" href="${r["Link Google Maps"]}" target="_blank" rel="noopener">Abrir no Maps</a>` : `<span class="map-btn" style="opacity:0.4;cursor:default">Sem link</span>`}
    </div>`).join("");
  return tabsHtml + `<div class="territorio-grid">${chips}</div>`;
}
function setTerritTab(t) { territTab = t; renderPanel(SECTIONS.find((s) => s.id === "territorio")); }

/* ---------- Agenda (custom) ---------- */
let openMonths = {};
function renderAgenda() {
  const rows = (DATA.agenda || []).filter((r) => yearOf(r["Data Início"] || r["Data"]) === currentYear);
  const byMonth = {};
  MESES.forEach((_, i) => byMonth[i] = []);
  rows.forEach((r) => {
    const d = r["Data Início"] || r["Data"];
    const m = monthOf(d);
    if (m !== null) byMonth[m].push(r);
  });
  Object.values(byMonth).forEach((list) => list.sort((a, b) => (a["Data Início"] || a["Data"] || "").localeCompare(b["Data Início"] || b["Data"] || "")));

  const monthsHtml = MESES.map((nome, i) => {
    const events = byMonth[i];
    const isOpen = openMonths[i] || false;
    const body = events.length === 0
      ? `<div class="month-empty">Sem eventos neste mês</div>`
      : events.map((r) => `
        <div class="card">
          <div class="card-head"><span>${formatDateHeader(r["Data Início"] || r["Data"])}</span><span>${escapeHtml(r["Tipo"] || "")}</span></div>
          <div class="card-body">
            ${fieldRow("Evento", r["Nome do Evento"])}
            ${fieldRow("Local", r["Local"])}
            ${fieldRow("Observações", r["Observações"])}
          </div>
        </div>`).join("");
    return `
      <button class="month-toggle ${isOpen ? "open" : ""}" onclick="toggleMonth(${i})">
        <span>${nome}</span>
        <span style="display:flex;align-items:center;gap:8px">${events.length ? `<span class="month-badge">${events.length}</span>` : ""}<span class="arrow">›</span></span>
      </button>
      <div class="month-body ${isOpen ? "open" : ""}" id="month-body-${i}">${body}</div>`;
  }).join("");

  return yearSelectorHtml("agenda") + monthsHtml;
}
function toggleMonth(i) {
  openMonths[i] = !openMonths[i];
  renderPanel(SECTIONS.find((s) => s.id === "agenda"));
}

/* ---------- Donativos (custom) ---------- */
function renderDonativos() {
  return `
    <div class="card">
      <div class="card-head">Um privilégio alegrador!</div>
      <div class="card-body">
        <p style="font-style:italic;color:var(--ink-soft)">A Bíblia diz em 2 Coríntios 9:7: "Faça cada um conforme resolveu no coração, não a contragosto nem por obrigação, pois Deus ama quem dá com alegria."</p>
        <p>Nossos donativos apoiam a pregação das boas novas do Reino em toda a Terra e cobrem as despesas de manutenção dos locais de adoração.</p>
        <a class="donate-cta-outline" href="https://www.jw.org/pt/testemunhas-de-jeova/perguntas-frequentes/como-testemunhas-jeova-usam-donativos/" target="_blank" rel="noopener">Saiba mais como os donativos são usados →</a>
      </div>
    </div>
    <div class="card">
      <div class="card-head">Cartão de Crédito e Boleto</div>
      <div class="card-body">
        <p style="font-size:0.9rem">No portal <strong>donate.jw.org</strong> você pode programar donativos mensais automáticos ou fazer doações únicas por cartão de crédito ou boleto, direcionando para a congregação local ou para a obra mundial.</p>
        <a class="donate-link-btn" href="https://donate.jw.org/pt/BRA/home" target="_blank" rel="noopener">Acessar donate.jw.org →</a>
      </div>
    </div>`;
}

/* ---------- Dispatcher ---------- */
function renderPanel(section) {
  const el = document.getElementById("panel-" + section.id);
  if (section.id === "inicio") { el.innerHTML = renderInicio(); return; }

  let body;
  if (section.custom === "agenda") body = renderAgenda();
  else if (section.custom === "reuniaoPublica") body = renderReuniaoPublica();
  else if (section.custom === "vidaMinisterio") body = renderVidaMinisterio();
  else if (section.custom === "grupos") body = renderGrupos();
  else if (section.custom === "responsaveis") body = renderResponsaveis();
  else if (section.custom === "territorio") body = renderTerritorio();
  else if (section.custom === "donativos") body = renderDonativos();
  else body = renderDateList(section);

  el.innerHTML = `<h2 class="panel-title">${section.title}</h2><p class="panel-desc">${section.desc}</p>${body}`;
}

/* ---------- Data load ---------- */
async function loadData() {
  try {
    const res = await fetch("/api/dados");
    if (!res.ok) throw new Error("Falha ao carregar dados");
    DATA = await res.json();
  } catch (e) {
    console.error(e);
    DATA = {};
  }
  SECTIONS.forEach(renderPanel);
}

/* ---------- Mobile sidebar toggle ---------- */
document.getElementById("menuToggle").addEventListener("click", () => {
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("scrim").classList.add("open");
});
document.getElementById("scrim").addEventListener("click", closeMobileSidebar);

/* ---------- Init ---------- */
buildSidebar();
buildPanels();
loadData();
const initial = location.hash ? location.hash.slice(1) : "inicio";
showPanel(SECTIONS.some((s) => s.id === initial) ? initial : "inicio");

</script>
</body>
